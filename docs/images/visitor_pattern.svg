<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340">
  <rect width="780" height="340" fill="#1e1e2e" rx="10"/>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,7 3.5,0 7" fill="#5ba3d9"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,7 3.5,0 7" fill="#a9dc76"/>
    </marker>
  </defs>

  <text x="390" y="24" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#89b4fa">Visitor 패턴 — CST 순회 &amp; AST 노드 생성</text>

  <!-- ─── CST side (left) ─── -->
  <text x="130" y="50" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#f38ba8">CST 노드</text>

  <!-- messageDef -->
  <rect x="60" y="58" width="140" height="28" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="130" y="77" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">messageDef</text>

  <line x1="100" y1="86" x2="80" y2="116" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="130" y1="86" x2="130" y2="116" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="160" y1="86" x2="180" y2="116" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="32" y="116" width="96" height="24" rx="4" fill="#2c3e50" stroke="#f38ba8" stroke-width="1"/>
  <text x="80" y="133" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#f38ba8">messageName</text>

  <rect x="82" y="116" width="96" height="24" rx="4" fill="#2c3e50" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="133" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#555">doMsgNameDef</text>

  <rect x="132" y="116" width="96" height="24" rx="4" fill="#2c3e50" stroke="#f38ba8" stroke-width="1"/>
  <text x="180" y="133" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#f38ba8">messageBody</text>

  <!-- messageName → ident → IDENTIFIER -->
  <line x1="80" y1="140" x2="80" y2="166" stroke="#f38ba8" stroke-width="1.1" marker-end="url(#a)"/>
  <rect x="34" y="166" width="92" height="22" rx="4" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1"/>
  <text x="80" y="182" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#7ec8e3">ID("Player")</text>

  <!-- messageBody → messageElement × n -->
  <line x1="180" y1="140" x2="160" y2="166" stroke="#f38ba8" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="180" y1="140" x2="200" y2="166" stroke="#f38ba8" stroke-width="1.1" marker-end="url(#a)"/>

  <rect x="106" y="166" width="108" height="22" rx="4" fill="#2c3e50" stroke="#f38ba8" stroke-width="1"/>
  <text x="160" y="182" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#f38ba8">field[0]</text>
  <rect x="150" y="166" width="108" height="22" rx="4" fill="#2c3e50" stroke="#f38ba8" stroke-width="1"/>
  <text x="204" y="182" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#f38ba8">field[1]</text>

  <!-- ─── VISITOR center ─── -->
  <rect x="290" y="58" width="200" height="260" rx="8" fill="#1a2535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="390" y="80" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#89b4fa">AstBuilder : Visitor</text>

  <!-- method boxes -->
  <rect x="308" y="92" width="164" height="52" rx="5" fill="#2c3e50" stroke="#89b4fa" stroke-width="1"/>
  <text x="390" y="108" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#89b4fa">VisitMessageDef(ctx)</text>
  <text x="390" y="122" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">name = ctx.messageName()</text>
  <text x="390" y="135" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">  .GetText();</text>

  <line x1="390" y1="144" x2="390" y2="164" stroke="#89b4fa" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="308" y="164" width="164" height="52" rx="5" fill="#2c3e50" stroke="#89b4fa" stroke-width="1"/>
  <text x="390" y="180" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#89b4fa">VisitField(ctx)</text>
  <text x="390" y="194" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">type = ctx.type_().GetText()</text>
  <text x="390" y="207" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">name = ctx.fieldName()…</text>

  <line x1="390" y1="216" x2="390" y2="236" stroke="#89b4fa" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="308" y="236" width="164" height="40" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1"/>
  <text x="390" y="252" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#a9dc76">return new</text>
  <text x="390" y="266" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#a9dc76">  MessageNode(...)</text>

  <!-- call arrows: CST → Visitor -->
  <line x1="200" y1="72" x2="288" y2="110" stroke="#5ba3d9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="248" y="92" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#5ba3d9" transform="rotate(-22,248,92)">Visit(messageDef)</text>

  <line x1="204" y1="177" x2="306" y2="187" stroke="#5ba3d9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="255" y="175" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#5ba3d9">Visit(field)</text>

  <!-- ─── AST side (right) ─── -->
  <text x="640" y="50" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#a9dc76">AST 결과</text>

  <!-- MessageNode -->
  <rect x="562" y="58" width="156" height="28" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="2"/>
  <text x="640" y="77" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#a9dc76">MessageNode</text>

  <line x1="620" y1="86" x2="590" y2="116" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="660" y1="86" x2="690" y2="116" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#b)"/>

  <rect x="542" y="116" width="100" height="24" rx="4" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1"/>
  <text x="592" y="133" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#7ec8e3">name:"Player"</text>

  <rect x="646" y="116" width="88" height="24" rx="4" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1"/>
  <text x="690" y="133" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" fill="#7ec8e3">fields[…]</text>

  <line x1="662" y1="140" x2="640" y2="166" stroke="#a9dc76" stroke-width="1.2" marker-end="url(#b)"/>
  <line x1="718" y1="140" x2="740" y2="166" stroke="#a9dc76" stroke-width="1.2" marker-end="url(#b)"/>

  <rect x="570" y="166" width="140" height="44" rx="4" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1"/>
  <text x="640" y="182" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#a9dc76">FieldNode</text>
  <text x="640" y="196" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">type:"string" name:"name"</text>
  <text x="640" y="208" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#7ec8e3">number:1</text>

  <rect x="714" y="166" width="58" height="44" rx="4" fill="#1a3a2a" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="743" y="186" text-anchor="middle" font-family="'Consolas',monospace" font-size="9" fill="#555">…</text>

  <!-- result arrow: Visitor → AST -->
  <line x1="492" y1="255" x2="560" y2="130" stroke="#a9dc76" stroke-width="1.8" marker-end="url(#b)"/>
  <text x="530" y="200" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#a9dc76" transform="rotate(-68,530,200)">AST 노드 반환</text>
</svg>
