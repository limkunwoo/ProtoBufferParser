// ====================================================
// 2. enums.proto - 다양한 Enum 정의 (package: game)
// 게임 전반에서 사용하는 열거형
// ====================================================
syntax = "proto3";

package game;

enum Rarity {
    RARITY_UNKNOWN = 0;
    RARITY_COMMON = 1;
    RARITY_UNCOMMON = 2;
    RARITY_RARE = 3;
    RARITY_EPIC = 4;
    RARITY_LEGENDARY = 5;
}

enum ElementType {
    ELEMENT_NONE = 0;
    ELEMENT_FIRE = 1;
    ELEMENT_WATER = 2;
    ELEMENT_EARTH = 3;
    ELEMENT_WIND = 4;
    ELEMENT_LIGHT = 5;
    ELEMENT_DARK = 6;
}

enum CharacterClass {
    CLASS_UNKNOWN = 0;
    CLASS_WARRIOR = 1;
    CLASS_MAGE = 2;
    CLASS_ARCHER = 3;
    CLASS_HEALER = 4;
    CLASS_ASSASSIN = 5;
}

enum StatusEffect {
    STATUS_NONE = 0;
    STATUS_POISON = 1;
    STATUS_BURN = 2;
    STATUS_FREEZE = 3;
    STATUS_STUN = 4;
    STATUS_BLEED = 5;
    STATUS_SILENCE = 6;
}

enum MatchState {
    MATCH_WAITING = 0;
    MATCH_LOADING = 1;
    MATCH_IN_PROGRESS = 2;
    MATCH_PAUSED = 3;
    MATCH_FINISHED = 4;
}
