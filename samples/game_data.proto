syntax = "proto3";

import "transform.proto";

enum ItemType {
    ITEM_UNKNOWN = 0;
    ITEM_WEAPON = 1;
    ITEM_ARMOR = 2;
    ITEM_CONSUMABLE = 3;
}

enum Rarity {
    COMMON = 0;
    UNCOMMON = 1;
    RARE = 2;
    EPIC = 3;
    LEGENDARY = 4;
}

message Item {
    int32 id = 1;
    string name = 2;
    ItemType type = 3;
    Rarity rarity = 4;
    int32 level = 5;
    map<string, int32> stats = 6;
}

message Player {
    int32 id = 1;
    string username = 2;
    int32 level = 3;
    float experience = 4;
    repeated Item inventory = 5;
    map<int32, int32> quest_progress = 6;
    Transform spawn_point = 7;

    message Stats {
        int32 strength = 1;
        int32 agility = 2;
        int32 intelligence = 3;
        float health = 4;
        float mana = 5;
    }

    Stats stats = 8;
}

message Guild {
    int32 id = 1;
    string name = 2;
    repeated Player members = 3;
    int32 level = 4;
}
