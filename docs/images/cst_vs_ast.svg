<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420">
  <rect width="820" height="420" fill="#1e1e2e" rx="10"/>

  <defs>
    <marker id="e" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,7 3.5,0 7" fill="#f38ba8"/>
    </marker>
    <marker id="g" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,7 3.5,0 7" fill="#a9dc76"/>
    </marker>
  </defs>

  <!-- ── LEFT: CST ── -->
  <text x="200" y="28" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#f38ba8">CST  (Parse Tree)</text>
  <text x="200" y="46" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#888">ANTLR이 자동 생성 — 문법 규칙 구조 그대로</text>

  <!-- node helper: cx, cy, label, color -->
  <!-- field (root) -->
  <rect x="148" y="58" width="104" height="28" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="200" y="77" text-anchor="middle" font-family="'Consolas',monospace" font-size="12" fill="#f38ba8">field</text>

  <!-- fieldLabel -->
  <line x1="170" y1="86" x2="90" y2="118" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="45" y="118" width="90" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="90" y="136" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">fieldLabel</text>

  <!-- REPEATED leaf -->
  <line x1="90" y1="144" x2="90" y2="176" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="38" y="176" width="104" height="26" rx="5" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1.2"/>
  <text x="90" y="194" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">REPEATED</text>

  <!-- type_ -->
  <line x1="188" y1="86" x2="200" y2="118" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="152" y="118" width="96" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="200" y="136" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">type_</text>

  <!-- STRING leaf -->
  <line x1="200" y1="144" x2="200" y2="176" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="152" y="176" width="96" height="26" rx="5" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1.2"/>
  <text x="200" y="194" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">STRING</text>

  <!-- fieldName -->
  <line x1="215" y1="86" x2="310" y2="118" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="262" y="118" width="96" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="310" y="136" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">fieldName</text>

  <!-- ident (under fieldName) -->
  <line x1="310" y1="144" x2="310" y2="176" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="262" y="176" width="96" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="310" y="194" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">ident</text>

  <!-- IDENTIFIER leaf -->
  <line x1="310" y1="202" x2="310" y2="234" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="248" y="234" width="124" height="26" rx="5" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1.2"/>
  <text x="310" y="252" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">ID("name")</text>

  <!-- EQ leaf (directly from field) -->
  <line x1="222" y1="86" x2="180" y2="280" stroke="#555" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#e)"/>
  <rect x="140" y="280" width="80" height="26" rx="5" fill="#1a1a2a" stroke="#555" stroke-width="1"/>
  <text x="180" y="298" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#555">EQ</text>

  <!-- fieldNumber -->
  <line x1="225" y1="86" x2="360" y2="176" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <!-- shift fieldNumber box a bit right -->
  <rect x="314" y="234" width="104" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="366" y="252" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">fieldNumber</text>

  <line x1="380" y1="176" x2="366" y2="234" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="318" y="176" width="124" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="380" y="194" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">fieldNumber</text>

  <!-- intLit -->
  <line x1="366" y1="260" x2="366" y2="292" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="322" y="292" width="88" height="26" rx="5" fill="#2c3e50" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="366" y="310" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#f38ba8">intLit</text>

  <!-- INT_LIT leaf -->
  <line x1="366" y1="318" x2="366" y2="350" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#e)"/>
  <rect x="318" y="350" width="96" height="26" rx="5" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1.2"/>
  <text x="366" y="368" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">INT_LIT("1")</text>

  <!-- SEMI leaf -->
  <line x1="228" y1="86" x2="80" y2="280" stroke="#555" stroke-width="1.1" stroke-dasharray="4,3" marker-end="url(#e)"/>
  <rect x="40" y="280" width="80" height="26" rx="5" fill="#1a1a2a" stroke="#555" stroke-width="1"/>
  <text x="80" y="298" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#555">SEMI</text>

  <!-- dashed = punctuation note -->
  <rect x="20" y="390" width="14" height="2" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="40" y="394" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">구두점 토큰 (의미 없음)</text>
  <rect x="165" y="388" width="14" height="8" rx="2" fill="#1a2a3a" stroke="#5ba3d9" stroke-width="1"/>
  <text x="185" y="394" font-family="'Segoe UI',sans-serif" font-size="10" fill="#7ec8e3">터미널(리프) 토큰</text>
  <rect x="310" y="388" width="14" height="8" rx="2" fill="#2c3e50" stroke="#f38ba8" stroke-width="1"/>
  <text x="330" y="394" font-family="'Segoe UI',sans-serif" font-size="10" fill="#f38ba8">규칙 노드 (중간)</text>

  <!-- ── RIGHT: AST ── -->
  <text x="650" y="28" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#a9dc76">AST  (Abstract Syntax Tree)</text>
  <text x="650" y="46" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#888">Visitor가 직접 구축 — 의미 있는 노드만</text>

  <!-- FieldNode (root) -->
  <rect x="578" y="58" width="144" height="28" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="2"/>
  <text x="650" y="77" text-anchor="middle" font-family="'Consolas',monospace" font-size="12" fill="#a9dc76">FieldNode</text>

  <!-- label -->
  <line x1="610" y1="86" x2="540" y2="138" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="480" y="138" width="120" height="26" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1.2"/>
  <text x="540" y="156" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">label: REPEATED</text>

  <!-- type -->
  <line x1="635" y1="86" x2="610" y2="138" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="556" y="138" width="108" height="26" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1.2"/>
  <text x="610" y="156" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">type: "string"</text>

  <!-- name -->
  <line x1="660" y1="86" x2="690" y2="138" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="638" y="138" width="104" height="26" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1.2"/>
  <text x="690" y="156" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">name: "name"</text>

  <!-- number -->
  <line x1="685" y1="86" x2="760" y2="138" stroke="#a9dc76" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="710" y="138" width="104" height="26" rx="5" fill="#1a3a2a" stroke="#a9dc76" stroke-width="1.2"/>
  <text x="762" y="156" text-anchor="middle" font-family="'Consolas',monospace" font-size="11" fill="#7ec8e3">number: 1</text>

  <!-- node count labels -->
  <text x="200" y="405" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#f38ba8">노드 수: ~14개</text>
  <text x="650" y="405" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#a9dc76">노드 수: 5개 ✓</text>

  <!-- divider -->
  <line x1="460" y1="10" x2="460" y2="415" stroke="#3d3d5c" stroke-width="1" stroke-dasharray="6,4"/>
</svg>
