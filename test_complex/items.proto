// ====================================================
// 3. items.proto - 아이템 시스템 (package: game)
// 중첩 메시지, enum 참조, map, repeated, bytes 포함
// ====================================================
syntax = "proto3";

package game;

import "enums.proto";
import "core_types.proto";

// 아이템 기본 정보
message Item {
    int32 item_id = 1;
    string name = 2;
    string description = 3;
    Rarity rarity = 4;
    int32 stack_count = 5;
    int32 max_stack = 6;
    bytes icon_data = 7;

    // 중첩: 아이템 스탯 보너스
    message StatBonus {
        string stat_name = 1;
        float value = 2;
        bool is_percentage = 3;
    }

    repeated StatBonus stat_bonuses = 8;

    map<string, string> custom_properties = 9;
}

// 장비 (Item 참조 + 추가 속성)
message Equipment {
    Item base_item = 1;
    int32 required_level = 2;
    ElementType element = 3;
    int32 durability = 4;
    int32 max_durability = 5;

    // 중첩: 인챈트
    message Enchantment {
        int32 enchant_id = 1;
        string enchant_name = 2;
        float power = 3;
        ElementType element_type = 4;
    }

    repeated Enchantment enchantments = 6;

    // 중첩: 소켓에 박힌 젬
    message SocketGem {
        int32 gem_id = 1;
        Rarity gem_rarity = 2;
        map<string, float> bonuses = 3;
    }

    repeated SocketGem sockets = 7;
}

// 인벤토리
message Inventory {
    int32 owner_id = 1;
    int32 max_slots = 2;
    repeated Item items = 3;
    map<int32, Item> slot_map = 4;
    int64 last_modified = 5;
}
